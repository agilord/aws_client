name: Analyze and test
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: dart-lang/setup-dart@v1
      - uses: actions/checkout@v2

      - name: Print Dart SDK version
        run: dart --version

      - name: Dart pub get
        run: dart pub get

      - name: Check formatting
        run: dart format . --set-exit-if-changed --language-version=3.0

      - name: Generate aws_client
        run: dart bin/generate.dart generate
        working-directory: generator

      - name: Analyze packages (highest dependencies)
        run: dart analyze --fatal-infos

      - name: "check for uncommitted changes"
        run: git diff --exit-code --stat -- .

      - name: Analyze aws_client package (lowest dependencies)
        run: dart pub downgrade && dart analyze --fatal-infos

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: dart-lang/setup-dart@v1

      - name: Run tests on generator
        run: dart pub get && dart test
        working-directory: generator

      - name: Run tests on aws_client
        run: dart pub get && dart test
        working-directory: aws_client

  localstack:
    name: LocalStack smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: dart-lang/setup-dart@v1

      - name: Start LocalStack
        run: docker compose up --detach --wait
        working-directory: aws_client

      - name: Run smoke tests on aws_client
        run: dart pub get && dart test test/localstack
        working-directory: aws_client

      - name: Stop LocalStack
        if: always()
        run: docker compose down
        working-directory: aws_client
